$schema: http://json-schema.org/draft-07/schema#
title: kind35128
description: "NIP-5A Named Site Manifest event"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 35128
        errorMessage: "kind must equal 35128"
      content:
        type: string
        maxLength: 0
        description: "Content must be empty"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 2
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag with the site identifier"
          - contains:
              $ref: "@/tag/path.yaml"
            errorMessage:
              contains: "tags must include at least one path tag"
    required:
      - kind
      - tags
