$schema: http://json-schema.org/draft-07/schema#
title: kind15128
description: "NIP-5A Root Site Manifest event"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 15128
        errorMessage: "kind must equal 15128"
      content:
        type: string
        maxLength: 0
        description: "Content must be empty"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        allOf:
          - contains:
              $ref: "@/tag/path.yaml"
            errorMessage:
              contains: "tags must include at least one path tag"
          - not:
              contains:
                allOf:
                  - $ref: "@/tag.yaml"
                  - type: array
                    items:
                      - const: "d"
            errorMessage:
              not: "root site manifest must not include a d tag"
    required:
      - kind
      - tags
