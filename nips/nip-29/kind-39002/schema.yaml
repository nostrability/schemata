$schema: http://json-schema.org/draft-07/schema#
title: kind39002
description: "Group members event defined by NIP-29"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 39002
        errorMessage: "kind must equal 39002"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag"
    required:
      - tags
    additionalProperties: true
