$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "layer"
      - type: string
        minLength: 1
        description: "Payment layer (e.g. onchain, lightning, liquid)"
    additionalItems: false
    errorMessage:
      minItems: "layer tag must have at least 2 elements"
