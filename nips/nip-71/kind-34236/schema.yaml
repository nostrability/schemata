$schema: http://json-schema.org/draft-07/schema#
title: kind34236
description: "Updatable vertical video event defined by NIP-71"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 34236
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
          - contains:
              $ref: "@/tag/title.yaml"
          - contains:
              allOf:
                - $ref: "@/tag.yaml"
                - type: array
                  minItems: 2
                  items:
                    - const: "imeta"
                  additionalItems: true
    required:
      - tags
    additionalProperties: true
