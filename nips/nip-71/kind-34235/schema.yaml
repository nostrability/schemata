$schema: http://json-schema.org/draft-07/schema#
title: kind34235
description: "Updatable horizontal video event defined by NIP-71"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 34235
        errorMessage: "kind must equal 34235"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag"
          - contains:
              $ref: "@/tag/title.yaml"
            errorMessage:
              contains: "tags must include a title tag"
          - contains:
              $ref: "nips/nip-71/tag/imeta/schema.yaml"
            errorMessage:
              contains: "tags must include an imeta tag with video metadata"
    required:
      - tags
    additionalProperties: true
