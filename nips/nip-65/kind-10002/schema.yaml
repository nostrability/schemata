$schema: http://json-schema.org/draft-07/schema#
title: kind10002
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 10002
        errorMessage: "kind must equal 10002"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        contains:
          $ref: "@/tag/r.yaml"
        minItems: 1
        errorMessage:
          contains: "tags must include at least one r tag with a relay URL"
          minItems: "tags array must have at least one tag"
    required:
      - kind
      - tags
