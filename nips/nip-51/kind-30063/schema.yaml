$schema: http://json-schema.org/draft-07/schema#
title: kind30063
description: Release Artifact Sets (NIP-51)
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 30063
        errorMessage: "kind must equal 30063"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag"
    required:
      - kind
      - tags
    allOf:
      - if:
          properties:
            tags:
              contains:
                type: array
                minItems: 1
                items:
                  - const: "title"
        then:
          properties:
            tags:
              contains:
                $ref: "@/tag/title.yaml"
      - if:
          properties:
            tags:
              contains:
                type: array
                minItems: 1
                items:
                  - const: "image"
        then:
          properties:
            tags:
              contains:
                $ref: "@/tag/image.yaml"
      - if:
          properties:
            tags:
              contains:
                type: array
                minItems: 1
                items:
                  - const: "description"
        then:
          properties:
            tags:
              contains:
                $ref: "@/tag/description.yaml"
    additionalProperties: true
