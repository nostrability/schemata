$schema: http://json-schema.org/draft-07/schema#
title: kind30007
description: Kind Mute Sets (NIP-51)
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 30007
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        allOf:
          - contains:
              allOf:
                - $ref: "@/tag.yaml"
                - type: array
                  minItems: 2
                  items:
                    - const: "d"
                    - type: string
                      pattern: '^\d+$'
                  additionalItems: true
        errorMessage:
          contains: "tags must include d tag with kind number value"
    required:
      - kind
      - tags
    allOf:
      - if:
          properties:
            tags:
              contains:
                type: array
                minItems: 1
                items:
                  - const: "title"
        then:
          properties:
            tags:
              contains:
                $ref: "@/tag/title.yaml"
      - if:
          properties:
            tags:
              contains:
                type: array
                minItems: 1
                items:
                  - const: "image"
        then:
          properties:
            tags:
              contains:
                $ref: "@/tag/image.yaml"
      - if:
          properties:
            tags:
              contains:
                type: array
                minItems: 1
                items:
                  - const: "description"
        then:
          properties:
            tags:
              contains:
                $ref: "@/tag/description.yaml"
    additionalProperties: true
