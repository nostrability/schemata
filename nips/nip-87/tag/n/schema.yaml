$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "n"
      - type: string
        enum: ["mainnet", "testnet", "signet", "regtest"]
        description: "Bitcoin network identifier"
    additionalItems: false
    errorMessage:
      minItems: "n tag must have at least 2 elements"
