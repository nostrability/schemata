$schema: http://json-schema.org/draft-07/schema#
title: kind30166
description: NIP-66 relay discovery event
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 30166
        errorMessage: "kind must equal 30166"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        contains:
          $ref: "@/tag/d.yaml"
        errorMessage:
          contains: "tags must include a d tag with the relay URL"
    required:
      - kind
      - tags
