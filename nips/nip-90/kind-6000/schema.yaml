$schema: http://json-schema.org/draft-07/schema#
title: NIP-90 DVM Job Result (kind 6000)
description: Data Vending Machine job result for text extraction (NIP-90)
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 6000
        description: "Kind 6000 identifies a text extraction job result"
        errorMessage: "kind must equal 6000"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 3
        errorMessage:
          minItems: "tags must contain at least three tags (e, p, amount)"
        allOf:
          - contains:
              $ref: "@/tag/e.yaml"
            errorMessage:
              contains: "tags must include an e tag referencing the job request event"
          - contains:
              $ref: "@/tag/p.yaml"
            errorMessage:
              contains: "tags must include a p tag with the customer's pubkey"
          - contains:
              $ref: "@/tag/amount.yaml"
            errorMessage:
              contains: "tags must include an amount tag with the charge in millisats"
          - if:
              contains:
                type: array
                items:
                  - const: "request"
            then:
              contains:
                $ref: "@/tag/request.yaml"
              errorMessage:
                contains: "if a request tag is present, it must match the request tag schema"
    required:
      - kind
      - tags
