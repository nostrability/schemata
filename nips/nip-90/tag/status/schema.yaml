$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    items:
      - const: "status"
      - type: string
        enum: ["payment-required", "processing", "error", "success", "partial"]
        description: "Job processing status"
      - type: string
        description: "Extra information about the status"
    additionalItems: false
