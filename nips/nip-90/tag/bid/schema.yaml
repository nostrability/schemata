$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "bid"
      - type: string
        pattern: "^[0-9]+$"
        description: "Maximum millisats the user is willing to pay"
    additionalItems: false
    errorMessage:
      minItems: "bid tag must have at least 2 elements"
