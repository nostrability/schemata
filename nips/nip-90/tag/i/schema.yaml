$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 3
    items:
      - const: "i"
      - type: string
        description: "Input data (URL, event ID, job ID, or text)"
      - type: string
        enum: ["url", "event", "job", "text"]
        description: "Input type"
    additionalItems:
      type: string
    errorMessage:
      minItems: "i tag must have at least 3 elements"
