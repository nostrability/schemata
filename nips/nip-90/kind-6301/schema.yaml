$schema: http://json-schema.org/draft-07/schema#
title: kind6301
description: NIP-90 DVM user discovery job result
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 6301
        errorMessage: "kind must equal 6301"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 3
        errorMessage:
          minItems: "tags must contain at least three tags (e, p, amount)"
        allOf:
          - contains:
              $ref: "@/tag/e.yaml"
            errorMessage:
              contains: "tags must include an e tag referencing the job request event"
          - contains:
              $ref: "@/tag/p.yaml"
            errorMessage:
              contains: "tags must include a p tag with the customer's pubkey"
          - contains:
              $ref: "nips/nip-90/tag/amount/schema.yaml"
            errorMessage:
              contains: "tags must include an amount tag with the charge in millisats"
          - if:
              contains:
                type: array
                items:
                  - const: "request"
            then:
              contains:
                $ref: "@/tag/request.yaml"
    required:
      - kind
      - tags
