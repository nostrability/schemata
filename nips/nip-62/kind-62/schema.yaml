$schema: http://json-schema.org/draft-07/schema#
title: kind62
description: NIP-62 request to vanish event
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 62
        errorMessage: "kind must equal 62"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        contains:
          $ref: "@/tag/relay.yaml"
        errorMessage:
          contains: "tags must include at least one relay tag"
    required:
      - kind
      - tags
