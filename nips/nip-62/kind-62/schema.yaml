$schema: http://json-schema.org/draft-07/schema#
title: kind62
description: NIP-62 request to vanish event
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 62
        errorMessage: "kind must equal 62"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        contains:
          allOf:
            - $ref: "@/tag.yaml"
            - type: array
              minItems: 2
              items:
                - const: "relay"
                - type: string
                  anyOf:
                    - pattern: '^(ws://|wss://).+$'
                    - const: "ALL_RELAYS"
              additionalItems: false
        errorMessage:
          contains: "tags must include at least one relay tag (ws(s):// URL or ALL_RELAYS)"
    required:
      - kind
      - tags
