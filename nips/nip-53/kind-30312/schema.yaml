$schema: http://json-schema.org/draft-07/schema#
title: kind30312
description: Meeting Space Event (Space Host, NIP-53)
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 30312
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag"
          - contains:
              $ref: "@/tag/room.yaml"
            errorMessage:
              contains: "tags must include a room tag"
          - contains:
              $ref: "@/tag/status-room.yaml"
            errorMessage:
              contains: "tags must include a status tag"
          - contains:
              $ref: "@/tag/service.yaml"
            errorMessage:
              contains: "tags must include a service tag"
          - contains:
              $ref: "@/tag/p.yaml"
            errorMessage:
              contains: "tags must include at least one p tag"
    required:
      - kind
      - tags

