$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    items:
      - const: "llm"
      - type: string
        minLength: 1
        description: "Language model identifier used for the prompt"
    additionalItems:
      type: string
    errorMessage:
      minItems: "llm tag must have at least 2 elements"
