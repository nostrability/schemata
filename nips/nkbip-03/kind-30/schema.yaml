$schema: http://json-schema.org/draft-07/schema#
title: kind30
description: "NKBIP-03 Internal Nostr reference (citation)"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 30
        errorMessage: "kind must equal 30"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        allOf:
          - contains:
              $ref: "@/tag/title.yaml"
            errorMessage:
              contains: "tags must include a title tag for the citation"
          - contains:
              $ref: "@/tag/author.yaml"
            errorMessage:
              contains: "tags must include an author tag"
          - if:
              contains:
                type: array
                items:
                  - const: "published_on"
            then:
              contains:
                $ref: "@/tag/published_on.yaml"
          - if:
              contains:
                type: array
                items:
                  - const: "accessed_on"
            then:
              contains:
                $ref: "@/tag/accessed_on.yaml"
    required:
      - kind
      - tags
