$schema: http://json-schema.org/draft-07/schema#
title: kind10096
description: NIP-96 file server preference list event
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 10096
        errorMessage: "kind must equal 10096"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        contains:
          $ref: "@/tag/server.yaml"
        minItems: 1
        errorMessage:
          type: "tags must be an array of valid tag tuples"
          contains: "tags must include at least one server tag"
          minItems: "tags array must have at least one tag"
    required:
      - kind
      - tags
