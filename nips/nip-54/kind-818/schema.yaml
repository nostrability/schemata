$schema: http://json-schema.org/draft-07/schema#
title: kind818
description: "NIP-54 Wiki Merge Request event"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 818
        errorMessage: "kind must equal 818"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        allOf:
          - contains:
              $ref: "@/tag/a.yaml"
            errorMessage:
              contains: "tags must include an a tag referencing the target wiki article"
          - contains:
              $ref: "@/tag/p.yaml"
            errorMessage:
              contains: "tags must include a p tag for the destination article owner"
          - contains:
              allOf:
                - $ref: "@/tag.yaml"
                - type: array
                  minItems: 4
                  items:
                    - const: "e"
                    - type: string
                      pattern: '^[a-f0-9]{64}$'
                    - type: string
                    - const: "source"
                  additionalItems: false
            errorMessage:
              contains: "tags must include an e tag with 'source' marker referencing the version to merge"
    required:
      - kind
      - tags
