$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "member"
      - allOf:
          - $ref: "@/secp256k1.yaml"
        description: "Hex-encoded pubkey of the member"
    additionalItems: false
    errorMessage:
      minItems: "member tag must have at least 2 elements"
