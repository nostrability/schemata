$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "claim"
      - type: string
        minLength: 1
        description: "Invite code string"
    additionalItems: false
    errorMessage:
      minItems: "claim tag must have at least 2 elements"
