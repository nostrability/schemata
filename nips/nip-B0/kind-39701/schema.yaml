$schema: http://json-schema.org/draft-07/schema#
title: kind39701
description: "NIP-B0 Web Bookmark event"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 39701
        errorMessage: "kind must equal 39701"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        allOf:
          - contains:
              $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag with the URL (without scheme)"
          - if:
              contains:
                type: array
                items:
                  - const: "title"
            then:
              contains:
                $ref: "@/tag/title.yaml"
          - if:
              contains:
                type: array
                items:
                  - const: "published_at"
            then:
              contains:
                $ref: "@/tag/published_at.yaml"
    required:
      - kind
      - tags
