$schema: http://json-schema.org/draft-07/schema#
title: kind2004
description: NIP-35 torrent comment event
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 2004
        errorMessage: "kind must equal 2004"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        contains:
          $ref: "@/tag/e.yaml"
        errorMessage:
          contains: "tags must include an e tag referencing the torrent event"
    required:
      - kind
      - tags
