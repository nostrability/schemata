$schema: http://json-schema.org/draft-07/schema#
title: kind1984
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 1984
        errorMessage: "kind must equal 1984"
      tags:
        type: array
        allOf:
          # MUST include a p tag referencing the reported user's pubkey
          - contains:
              $ref: "@/tag/nip-56_p.yaml"
            errorMessage:
              contains: "tags must include a p tag referencing the reported user"
          # MUST include at least one report tag (p/e/x) with a report type as the 3rd item
          - contains:
              anyOf:
                - $ref: "@/tag/nip-56_p.yaml"
                - $ref: "@/tag/nip-56_e.yaml"
                - $ref: "@/tag/nip-56_x.yaml"
            errorMessage:
              contains: "tags must include at least one report tag (p, e, or x) with a report type"
