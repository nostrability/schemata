$schema: http://json-schema.org/draft-07/schema#
title: kind1337
description: "NIP-C0 Code Snippet event"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 1337
        errorMessage: "kind must equal 1337"
      content:
        type: string
        minLength: 1
        description: "The code snippet text"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        allOf:
          - if:
              contains:
                type: array
                items:
                  - const: "name"
            then:
              contains:
                $ref: "@/tag/name.yaml"
          - if:
              contains:
                type: array
                items:
                  - const: "description"
            then:
              contains:
                $ref: "@/tag/description.yaml"
    required:
      - kind
      - content
      - tags
