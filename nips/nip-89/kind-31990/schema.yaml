$schema: http://json-schema.org/draft-07/schema#
title: kind31990
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 31990
        errorMessage: "kind must equal 31990"
      tags:
        allOf:
          # At least one ["d", <random-id>]
          - contains:
              allOf:
                - $ref: "@/tag/d.yaml"
            errorMessage:
              contains: "tags must include a d tag"
          # At least one ["k", <supported-event-kind>]
          - contains:
              allOf:
                - $ref: "@/tag/k.yaml"
            errorMessage:
              contains: "tags must include a k tag identifying a supported event kind"
