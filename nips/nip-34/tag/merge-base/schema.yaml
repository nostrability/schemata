$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "merge-base"
      - type: string
        pattern: '^[a-f0-9]{40}$'
        description: "Most recent common ancestor commit hash"
    additionalItems: false
    errorMessage:
      minItems: "merge-base tag must have at least 2 elements"
