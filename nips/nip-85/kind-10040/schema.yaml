$schema: http://json-schema.org/draft-07/schema#
title: kind10040
description: "NIP-85 Trusted Assertions provider declaration"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 10040
        errorMessage: "kind must equal 10040"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 1
        errorMessage:
          minItems: "tags must contain at least one provider declaration tag"
    required:
      - kind
      - tags
