$schema: http://json-schema.org/draft-07/schema#
title: kind1244
description: "NIP-A0 Voice Message Reply (NIP-22 comment threading)"
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 1244
        errorMessage: "kind must equal 1244"
      content:
        type: string
        pattern: "^https?://\\S+$"
        description: "URL pointing directly to an audio file"
        errorMessage: "content must be a URL to an audio file"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        allOf:
          # NIP-22 requires uppercase K tag for the root event kind
          - contains:
              allOf:
                - $ref: "@/tag.yaml"
                - type: array
                  minItems: 2
                  items:
                    - const: "K"
                    - type: string
                      pattern: '^[0-9]+$'
            errorMessage:
              contains: "tags must include a K tag with the root event kind (NIP-22)"
    required:
      - kind
      - content
      - tags
