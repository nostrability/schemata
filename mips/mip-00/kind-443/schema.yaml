$schema: http://json-schema.org/draft-07/schema#
title: kind443
description: Marmot KeyPackage event (MIP-00)
allOf:
  - $ref: "@/note.yaml"
  - type: object
    properties:
      kind:
        const: 443
        errorMessage: "kind must equal 443"
        description: "Kind number reserved for Marmot KeyPackage events"
      content:
        type: string
        pattern: "^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$"
        minLength: 48
        errorMessage: "content must be a base64-encoded MLS KeyPackage bundle"
        description: "Base64-encoded TLS-serialized MLS KeyPackageBundle"
      tags:
        type: array
        items:
          $ref: "@/tag.yaml"
        minItems: 7
        allOf:
          - contains:
              $ref: "@/tag/mls_protocol_version.yaml"
            errorMessage:
              contains: "tags must include an mls_protocol_version tag"
          - contains:
              $ref: "@/tag/mls_ciphersuite.yaml"
            errorMessage:
              contains: "tags must include an mls_ciphersuite tag"
          - contains:
              $ref: "@/tag/mls_extensions.yaml"
            errorMessage:
              contains: "tags must include an mls_extensions tag"
          - contains:
              $ref: "@/tag/mls_proposals.yaml"
            errorMessage:
              contains: "tags must include an mls_proposals tag"
          - contains:
              $ref: "@/tag/relays.yaml"
            errorMessage:
              contains: "tags must include a relays tag"
          - contains:
              $ref: "@/tag/encoding.yaml"
            errorMessage:
              contains: "tags must include an encoding tag"
          - contains:
              $ref: "@/tag/mip-00_i.yaml"
            errorMessage:
              contains: "tags must include an i tag"
    required:
      - kind
      - tags
