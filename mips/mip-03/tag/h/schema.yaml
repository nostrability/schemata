$schema: "http://json-schema.org/draft-07/schema#"
allOf:
  - $ref: "@/tag.yaml"
  - type: array
    minItems: 2
    maxItems: 2
    items:
      - const: "h"
      - type: string
        pattern: "^[a-f0-9]{64}$"
        description: "Hex-encoded nostr_group_id (32-byte random identifier)"
    additionalItems: false
